# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.16.0"
  # technically 18.12.0, but not available for testing
  nodejs_min: 18.12.1

package:
  name: yarn
  version: ${{ version }}

source:
  - url: https://registry.npmjs.org/@yarnpkg/cli-dist/-/cli-dist-${{ version }}.tgz
    sha256: 22c53c0273df27ba5589a71240c93c5e470f86b11ff7b89f14edc7bec0c07c02
  - url: https://raw.githubusercontent.com/yarnpkg/berry/%40yarnpkg/cli/${{ version }}/LICENSE.md
    sha256: 238d933f5c226cc197bd1dae2ad0c468e157b4cba8ed844f81549ba6db777dc4

build:
  number: 1
  noarch: generic
  script:
    # The upstream launcher ships as bin/yarn.js (a CommonJS bundle). Node
    # resolves a file's module type from the nearest ancestor package.json, so
    # inside a project that sets "type": "module" Node loads yarn.js as ESM and
    # crashes with 'Dynamic require of "util" is not supported'. Renaming it to
    # bin/yarn.cjs forces CommonJS regardless of any parent package.json; the
    # shims are repointed to match. We avoid shipping a package.json marker in
    # $PREFIX/bin because that directory is shared with other packages.
    - if: win
      then:
        - move bin\yarn.js bin\yarn.cjs
        - powershell -Command "@('bin\yarn','bin\yarn.cmd','bin\yarn.ps1') | ForEach-Object { (Get-Content $_) -replace 'yarn\.js','yarn.cjs' | Set-Content $_ }"
        - xcopy /s /y bin\* "${{ PREFIX }}\Library\bin\"  || exit 1
      else:
        - mkdir -p "${{ PREFIX }}/bin"
        - mv bin/yarn.js bin/yarn.cjs
        - sed -i.bak 's/yarn\.js/yarn.cjs/g' bin/yarn bin/yarn.cmd bin/yarn.ps1 && rm -f bin/*.bak
        - chmod 755 bin/*
        - cp bin/* "${{ PREFIX }}/bin"

requirements:
  run:
    - __${{ noarch_platform }}
    - nodejs >=${{ nodejs_min }}

tests:
  - package_contents:
      files:
        - if: unix
          then: bin/yarn
          else: Library\bin\yarn.cmd
  - requirements:
      run:
        - nodejs ${{ nodejs_min }}.*
        - pytest
    script:
      interpreter: python
      file: run_test.py

about:
  license: BSD-2-Clause
  license_file: LICENSE.md
  summary: Fast, reliable, and secure dependency management.
  homepage: https://yarnpkg.com
  repository: https://github.com/yarnpkg/berry
  documentation: https://yarnpkg.com/getting-started
  description: |
    Yarn is a package manager for your code. It allows you to use and share
    code with other developers from around the world. Yarn does this
    quickly, securely, and reliably so you don't ever have to worry.

extra:
  recipe-maintainers:
    - dfroger
    - bollwyvl
